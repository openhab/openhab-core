variables:
  mainmoo: cow

plain:
  data: !include
    file: subOnInclude.inc.yaml
    vars:
      moo: ${mainmoo}
sub: !sub
  data: !include
    file: subOnInclude.inc.yaml
    vars:
      moo: ${mainmoo} # This gets substituted to 'cow' then passed into the include
nosub: !nosub
  data: !include
    file: subOnInclude.inc.yaml
    vars:
      moo: ${mainmoo}